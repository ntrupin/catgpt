<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CatGPT</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local Cat Chat</p>
          <h1>CatGPT</h1>
        </div>
        <div id="cat-face" class="cat-face" aria-hidden="true">=^.^=</div>
      </header>

      <section class="statusbar">
        <span class="label">Mood</span>
        <span id="mood-pill" class="mood-pill" data-mood="{{ mood }}">{{ mood|lower }}</span>
        {% if mode == "reasoning" %}
        <span class="label">State</span>
        <span id="reasoning-chip" class="reasoning-chip idle">idle</span>
        <span class="label">Intent</span>
        <span id="intent-chip" class="intent-chip">observing</span>
        {% endif %}
        {% if mode == "reasoning" %}
        <button id="rollout-toggle" type="button" class="rollout-toggle" aria-expanded="false" aria-controls="rollout-panel">
          show rollouts
        </button>
        {% endif %}
      </section>

      <section class="workspace{% if mode == 'reasoning' %} reasoning-workspace gallery-collapsed{% endif %}">
        <section id="chat" class="chat-log" aria-live="polite"></section>
        {% if mode == "reasoning" %}
        <aside id="rollout-panel" class="rollout-panel" aria-live="polite" aria-hidden="true">
          <div class="rollout-head">
            <div>
              <p class="eyebrow">Rollout Gallery</p>
              <h2>Sampled Cat Brains</h2>
            </div>
            <span id="rollout-summary" class="rollout-summary">waiting</span>
          </div>
          <div id="rollout-gallery" class="rollout-gallery">
            <p class="rollout-empty">The gallery fills in after a reasoning turn.</p>
          </div>
        </aside>
        {% endif %}
      </section>

      <form id="chat-form" class="composer" autocomplete="off">
        <input id="message" name="message" type="text" placeholder="Say hi to the cat..." maxlength="220" required />
        <button type="submit">Send</button>
        <button id="reset" type="button" class="ghost">Reset Mood</button>
      </form>
    </main>
    <script>
      window.CATGPT_INIT_MOOD = "{{ mood }}";
      window.CATGPT_MODE = "{{ mode }}";
    </script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
